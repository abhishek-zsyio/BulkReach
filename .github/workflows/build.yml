name: Build Desktop Applications

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: bulkreach/frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bulkreach/backend/requirements.txt

      - name: Build Python Backend
        run: |
          cd bulkreach/backend
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          python build_backend.py

      - name: Build Electron App
        run: |
          cd bulkreach/frontend
          npm install
          npm run electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bulkreach-macos
          path: bulkreach/frontend/dist-electron/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: bulkreach/frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bulkreach/backend/requirements.txt

      - name: Build Python Backend
        shell: bash
        run: |
          cd bulkreach/backend
          python -m venv venv
          source venv/Scripts/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          python build_backend.py

      - name: Build Electron App
        shell: bash
        run: |
          cd bulkreach/frontend
          npm install
          npm run electron:build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bulkreach-windows
          path: |
            bulkreach/frontend/dist-electron/*.exe
          if-no-files-found: error
