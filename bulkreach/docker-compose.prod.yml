version: "3.9"

networks:
  bulkreach_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:

services:
  db:
    image: postgres:15-alpine
    container_name: bulkreach_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bulkreach_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bulkreach_redis_prod
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - bulkreach_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bulkreach_backend_prod
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    env_file:
      - ./backend/.env
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    networks:
      - bulkreach_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bulkreach_celery_prod
    restart: always
    command: celery -A config worker --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env
    volumes:
      - media_files:/app/media
    networks:
      - bulkreach_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bulkreach_celery_beat_prod
    restart: always
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./backend/.env
    networks:
      - bulkreach_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: bulkreach_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/var/www/static
      - media_files:/var/www/media
    networks:
      - bulkreach_network
    depends_on:
      - backend
