version: "3.9"

networks:
  bulkreach_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:

services:
  db:
    image: postgres:15-alpine
    container_name: bulkreach_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bulkreach
      POSTGRES_USER: bulkreach
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bulkreach_network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulkreach"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bulkreach_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - bulkreach_network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bulkreach_backend
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    networks:
      - bulkreach_network
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bulkreach_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - media_files:/app/media
    networks:
      - bulkreach_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bulkreach_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - bulkreach_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bulkreach_frontend
    restart: unless-stopped
    networks:
      - bulkreach_network
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
